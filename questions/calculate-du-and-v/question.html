<pl-question-panel>
    <p>
        Consider the following integral: $$\int {{params.integrand}}dx$$ 
        Let $$u = {{params.u}}$$ and $$dv = {{params.dv}}dx$$ Compute $du$ by differentiating $u$, and compute $v$ by integrating ${{params.dv}}dx$. Don't forget the constant of integration!
    </p>
</pl-question-panel>

<pl-symbolic-input
    answers-name="du"
    label="$du = $"
    variables="{{params.x}},{{params.dx}}"
    display="block"
></pl-symbolic-input>

<pl-symbolic-input
    answers-name="v"
    label="$v = $"
    variables="{{params.x}},{{params.C}}"
    display="block"
></pl-symbolic-input>
